name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-push:
    name: Build and push image to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      # ── Free up runner disk space ──────────────────────────────────────────
      # The default GitHub-hosted runner has ~14 GB free. Removing unused
      # toolchains recovers ~10 GB, which gives Docker's build cache room to
      # breathe. Adjust the flags below if you need any of these tools.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false     # keep actions tool cache (Node, etc.)
          android: true
          dotnet: true
          haskell: true
          large-packages: true  # removes ~4 GB of misc apt packages
          docker-images: true   # remove pre-loaded Docker images
          swap-storage: true    # disable swap file to reclaim ~4 GB

      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Docker setup ──────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Registry login ─────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # no extra secrets needed

      # ── Image metadata ─────────────────────────────────────────────────────
      # Produces tags + OCI labels from git context.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tunefetch
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      # ── Build & push ──────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — reuses layers across pushes,
          # keeps repeated builds fast without an external registry.
          cache-from: type=gha
          cache-to: type=gha,mode=max
