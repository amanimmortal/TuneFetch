# Example docker-compose for Unraid. Copy to docker-compose.yml and
# adjust the host paths, env vars, and port to suit your setup.

services:
  tunefetch:
    build: .
    # image: ghcr.io/<you>/tunefetch:latest
    container_name: tunefetch
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # --- required ---
      TUNEFETCH_SECRET: 'change-me-to-a-random-string-of-at-least-32-chars'
      PUID: '99'   # nobody on Unraid
      PGID: '100'  # users on Unraid
      # --- optional first-run admin seed ---
      TUNEFETCH_ADMIN_USER: 'admin'
      TUNEFETCH_ADMIN_PASSWORD: 'change-me'
    volumes:
      # Persistent app data (SQLite DB + any runtime config).
      - /mnt/user/appdata/tunefetch:/app/data
      # Lidarr root folders. All are mounted rw because any can become
      # an owner or a mirror target depending on which list adds first.
      - /mnt/user/media/music/parents:/mnt/music/parents
      - /mnt/user/media/music/kids:/mnt/user/media/music/kids
      # Add more root folders here as needed:
      # - /mnt/user/media/music/other:/mnt/music/other
